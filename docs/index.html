<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <title>ros2mobile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-background-color: #1a1a2e;
      --base-color: #e0e0e0;
      --heading-color: #d4af37;
      --link-color: #d4af37;
      --link-color--hover: #f0d060;
      --sidebar-background: #16213e;
      --sidebar-name-color: #d4af37;
      --sidebar-nav-link-color--active: #d4af37;
      --cover-background-color: #1a1a2e;
      --table-head-background: #16213e;
    }
    .markdown-section table { border-collapse: collapse; width: 100%; }
    .markdown-section th, .markdown-section td { border: 1px solid #333; padding: 8px 12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'ros2mobile',
      repo: 'https://github.com/taikitanaka3/ros2-mobile',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
</body>
</html>
